services:
  # AI Agent Web UI
  agent-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drug-pricing-agent
    ports:
      - "8501:8501"
    environment:
      # MongoDB Configuration
      - MONGODB_URI=${MONGODB_URI}
      
      # Grove Gateway (OpenAI) Configuration
      - GROVE_API_KEY=${GROVE_API_KEY}
      - GROVE_ENDPOINT=${GROVE_ENDPOINT:-https://grove-gateway-prod.azure-api.net/grove-foundry-prod/openai/v1/chat/completions}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.2}
      
      # Voyage AI (Embeddings) Configuration
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
      - VOYAGE_ENDPOINT=${VOYAGE_ENDPOINT:-https://ai.mongodb.com/v1/embeddings}
      - VOYAGE_MODEL=${VOYAGE_MODEL:-voyage-4-large}
    volumes:
      # Mount dataset directory for persistence
      - ./dataset:/app/dataset
    restart: unless-stopped
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  agent-network:
    driver: bridge

